name: iClash
options:
  bundleIdPrefix: com.iclash
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: iClash
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES

targets:
  iClash:
    type: application
    platform: macOS
    sources:
      - path: iClashSource
        excludes:
          - "**/.DS_Store"
          - "Supporting"
      - path: iClashSource/Resources/mihomo
        buildPhase: resources
        codeSign: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iclash.macos
        INFOPLIST_FILE: iClashSource/Supporting/Info.plist
        CODE_SIGN_ENTITLEMENTS: iClash.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: iClash.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.network.server: true
  iClashTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: iClashTests
    dependencies:
      - target: iClash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iclash.macos.tests
        PRODUCT_NAME: iClashTests
        SWIFT_MODULE_NAME: iClashTests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"

schemes:
  iClash:
    build:
      targets:
        iClash: all
        iClashTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - name: iClashTests
